<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart | Student Essentials</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/cart.css" />
  </head>
  <body>
    <div class="dashboard-wrapper">
      <aside class="sidebar">
        <h3>
          <img src="../assets/more.png" width="30" height="30" />
          <span>Menu</span>
        </h3>
        <ul>
          <li>
            <a href="dashboard.html"
              ><img src="../assets/storefront.png" width="30" height="30" />
              <span>Shop</span></a
            >
          </li>
          <li>
            <a href="profile.html"
              ><img src="../assets/user.png" width="30" height="30" /><span>
                Profile</span
              ></a
            >
          </li>
          <li>
            <a href="cart.html"
              ><img
                src="../assets/grocery-store.png"
                width="30"
                height="30"
              /><span>Cart</span></a
            >
          </li>
          <li>
            <a href="billing.html"
              ><img src="../assets/bill.png" width="30" height="30" /><span>
                Billing</span
              ></a
            >
          </li>
          <li>
            <a href="feedback.html"
              ><img src="../assets/review.png" width="30" height="30" /><span>
                Feedback</span
              ></a
            >
          </li>
          <li>
            <a href="query.html">
              <img src="../assets/question.png" width="30" height="30" /><span
                >Query</span
              ></a
            >
          </li>
          <li>
            <a href="#" id="logoutBtn"
              ><img src="../assets/logout.png" width="30" height="30" />
              <span>Logout</span></a
            >
          </li>
        </ul>
      </aside>
      <main class="dashboard-main">
        <div class="cart-container">
          <h2>Your Cart</h2>
          <div id="cartItemsList" class="cart-items"></div>
          <div class="cart-summary">
            <h3>Total: ₹<span id="cartTotal">0</span></h3>
            <button id="checkoutBtn" class="btn-primary">Proceed to Billing</button>
          </div>
          <button id="continueShopping" class="btn-secondary">
            Continue Shopping
          </button>
        </div>
      </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/cart.js"></script>
  </body>
</html>
