<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buyer Dashboard | Student Essentials</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/dashboard.css" />
    <link rel="stylesheet" href="../css/dashboard-shop.css" />

    <!-- REACT & REACT DOM -->
    <script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <!-- Babel for JSX translation in the browser -->
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div class="dashboard-wrapper">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h3>
          <img src="../assets/more.png" width="30" height="30" />
          <span>Menu</span>
        </h3>
        <ul>
          <li>
            <a href="dashboard.html"
              ><img src="../assets/storefront.png" width="30" height="30" />
              <span>Shop</span></a
            >
          </li>
          <li>
            <a href="profile.html"
              ><img src="../assets/user.png" width="30" height="30" /><span>
                Profile</span
              ></a
            >
          </li>
          <li>
            <a href="cart.html"
              ><img
                src="../assets/grocery-store.png"
                width="30"
                height="30"
              /><span>Cart</span></a
            >
          </li>
          <li>
            <a href="billing.html"
              ><img src="../assets/bill.png" width="30" height="30" /><span>
                Billing</span
              ></a
            >
          </li>
          <li>
            <a href="feedback.html">
              <img src="../assets/review.png" width="30" height="30" />
              <span>Feedback</span></a
            >
          </li>
          <li>
            <a href="query.html">
              <img src="../assets/question.png" width="30" height="30" /><span
                >Query</span
              ></a
            >
          </li>
          <li>
            <a href="#" id="logoutBtn"
              ><img src="../assets/logout.png" width="30" height="30" />
              <span>Logout</span></a
            >
          </li>
        </ul>
      </aside>

      <!-- Main Content -->
      <main class="dashboard-main">
        <div class="top-bar">
          <h2>Shopping Dashboard</h2>
          <span id="userGreeting"></span>
        </div>

        <!-- Mini Cart Summary -->
        <div class="cart-summary-card">
          <span
            >🛒 Cart items: <strong id="cartItemCount">0</strong> | Total:
            ₹<strong id="cartTotalPreview">0</strong></span
          >
          <a href="cart.html">View Cart & Checkout</a>
        </div>

        <!-- Filters -->

        <!-- React will inject filters + product grid here -->
        <div id="react-product-section"></div>
      </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/dashboard.js"></script>
    <script type="text/babel">
      const { useState, useEffect } = React;

      function ProductSection() {
        const [products, setProducts] = useState([]);
        const [category, setCategory] = useState("all");
        const [priceRange, setPriceRange] = useState("all");

        // Function to refresh products from localStorage
        const refreshProducts = () => {
          const stored = JSON.parse(localStorage.getItem("products")) || [];
          console.log("Refreshing products:", stored.length);
          setProducts(stored);
        };

        // Load initial products + set up listeners for real‑time sync
        useEffect(() => {
          refreshProducts();

          // Listen for changes in other tabs/windows (cross‑tab sync)
          const handleStorage = (e) => {
            if (e.key === "products") {
              refreshProducts();
            }
          };
          window.addEventListener("storage", handleStorage);

          // Listen for custom event from common.js (same‑tab sync)
          window.addEventListener("products-changed", refreshProducts);

          return () => {
            window.removeEventListener("storage", handleStorage);
            window.removeEventListener("products-changed", refreshProducts);
          };
        }, []);

        // Filter products based on category and price
        const filteredProducts = products.filter((p) => {
          if (category !== "all" && p.category !== category) return false;
          if (priceRange === "1000+") return p.price >= 1000;
          if (priceRange !== "all") {
            const [min, max] = priceRange.split("-").map(Number);
            return p.price >= min && p.price <= max;
          }
          return true;
        });

        const handleAddToCart = (product) => {
          // Prevent adding if out of stock
          if (product.stock <= 0) {
            alert("Out of stock!");
            return;
          }
          if (typeof window.addToCart === "function") {
            window.addToCart(product.id, 1);
            if (typeof window.updateCartCountDisplay === "function")
              window.updateCartCountDisplay();
            if (typeof window.updateCartPreview === "function")
              window.updateCartPreview();
            alert("Added to cart!");
          } else {
            alert("Please login first");
            window.location.href = "login.html";
          }
        };

        return (
          <div>
            {/* Filter UI */}
            <div className="filter-section">
              <div className="filter-group">
                <label>Category:</label>
                <select
                  value={category}
                  onChange={(e) => setCategory(e.target.value)}
                >
                  <option value="all">All</option>
                  <option value="stationery">Stationery</option>
                  <option value="gadgets">Gadgets</option>
                  <option value="accessories">Accessories</option>
                  <option value="study">Study Materials</option>
                </select>
              </div>
              <div className="filter-group">
                <label>Price Range:</label>
                <select
                  value={priceRange}
                  onChange={(e) => setPriceRange(e.target.value)}
                >
                  <option value="all">All</option>
                  <option value="0-100">₹0 - ₹100</option>
                  <option value="100-500">₹100 - ₹500</option>
                  <option value="500-1000">₹500 - ₹1000</option>
                  <option value="1000+">₹1000+</option>
                </select>
              </div>
              <button
                className="btn-secondary"
                onClick={() => {
                  setCategory("all");
                  setPriceRange("all");
                }}
              >
                Reset
              </button>
            </div>

            {/* Product Grid */}
            <div className="dashboard-products">
              <h3>All Products</h3>
              <div className="product-grid">
                {filteredProducts.length === 0 ? (
                  <p>No products match your filters.</p>
                ) : (
                  filteredProducts.map((product) => (
                    <div key={product.id} className="product-card">
                     
                      <img
                        src={product.image}
                        alt={product.name}
                        onError={(e) => {
                          e.target.src = "https://picsum.photos/id/1/300/200";
                        }}
                      />
                      <div className="product-info">
                        <div className="product-title">{product.name}</div>
                        <div className="product-price">₹{product.price}</div>
                        <div
                          className="product-stock"
                          style={{
                            fontSize: "0.8rem",
                            color: product.stock > 0 ? "#2e7d32" : "#c0392b",
                          }}
                        >
                          {product.stock > 0
                            ? `In stock: ${product.stock}`
                            : "Out of stock"}
                        </div>
                        <div className="product-desc">
                          {product.description}
                        </div>
                        <button
                          className="add-to-cart-dash"
                          onClick={() => handleAddToCart(product)}
                          disabled={product.stock === 0}
                          style={{
                            opacity: product.stock === 0 ? 0.5 : 1,
                            cursor:
                              product.stock === 0 ? "not-allowed" : "pointer",
                          }}
                        >
                          {product.stock > 0 ? "Add to Cart" : "Out of Stock"}
                        </button>
                      </div>
                    </div>
                  ))
                )}
              </div>
            </div>
          </div>
        );
      }

      // Render using createRoot (React 18)
      const container = document.getElementById("react-product-section");
      if (container) {
        if (ReactDOM.createRoot) {
          ReactDOM.createRoot(container).render(<ProductSection />);
        } else {
          ReactDOM.render(<ProductSection />, container);
        }
      }
    </script>
  </body>
</html>
