<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register | Student Essentials</title>
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/auth.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <a href="../index.html" class="logo">📚 StudentEssentials</a>
        <div class="nav-icons">
          <a href="login.html">Login</a>
        </div>
      </div>
    </nav>

    <div class="form-container">
      <div class="form-card">
        <h2>Create Account</h2>
        <form id="registerForm">
          <label>Full Name</label>
          <input type="text" id="regName" required />

          <label>Email</label>
          <input type="email" id="regEmail" required />

          <label>Password</label>
          <input type="password" id="regPassword" required />

          <label>Confirm Password</label>
          <input type="password" id="regConfirmPassword" required />

          <label>Role</label>
          <select id="regRole">
            <option value="buyer">Buyer (Student)</option>
            <option value="seller">Seller (Shop Owner)</option>
          </select>

          <button type="submit" class="btn-primary">Register</button>
          <p>Already have an account? <a href="login.html">Login here</a></p>
        </form>
      </div>
    </div>

    <script src="../js/common.js"></script>
    <script>
      document
        .getElementById("registerForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const name = document.getElementById("regName").value;
          const email = document.getElementById("regEmail").value;
          const pwd = document.getElementById("regPassword").value;
          const confirm = document.getElementById("regConfirmPassword").value;
          const role = document.getElementById("regRole").value;

          if (pwd !== confirm) {
            alert("Passwords do not match");
            return;
          }
          if (registerUser(name, email, pwd, role)) {
            alert("Registration successful! Please login.");
            window.location.href = "login.html";
          } else {
            alert("User already exists. Try a different email.");
          }
        });
    </script>
  </body>
</html>
